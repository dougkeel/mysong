<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Chord Viewer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Rigid root wrapper framework preventing any viewport collapses */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            width: 100vw;
            height: 100vh; 
            overflow: hidden; 
            background-color: #1e1e1e; 
            color: #f5f5f5; 
        }
        
        /* COLUMN 1: Fixed Sidebar layout */
        #sidebar { 
            width: 300px; 
            flex-shrink: 0; 
            border-right: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            background: #252526; 
            z-index: 10; 
        }
        #search-box { padding: 15px; border-bottom: 1px solid #333; }
        #search-box input { width: 100%; padding: 10px; background: #3c3c3c; border: 1px solid #555; color: white; border-radius: 4px; font-size: 14px; }
        #song-list { flex: 1; overflow-y: auto; list-style: none; }
        #song-list li { padding: 12px 15px; border-bottom: 1px solid #2d2d2d; cursor: pointer; }
        #song-list li.active { background: #007acc; color: white; }
        .song-title { font-weight: bold; font-size: 14px; }
        .song-artist { font-size: 12px; color: #aaa; }

        /* COLUMN 2: Center lyric stage locked against 0px compression bugs */
        #center-stage { 
            flex: 1; 
            min-width: 0; 
            display: flex; 
            flex-direction: column; 
            background: #1e1e1e; 
        }
        #header-bar { height: 50px; border-bottom: 1px solid #333; display: flex; justify-content: flex-end; align-items: center; padding: 0 20px; background: #252526; }
        
        #toggle-panel-btn { background: #3c3c3c; border: 1px solid #555; color: #f5f5f5; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        #toggle-panel-btn.active { background: #007acc; border-color: #007acc; }

        #content-area { flex: 1; padding: 40px; overflow-y: auto; }
        pre { font-family: 'Courier New', Courier, Monaco, monospace; font-size: 18px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
        
        /* Interactive text chord markers */
        .clickable-chord { color: #4fc1ff; font-weight: bold; cursor: pointer; padding: 0 2px; border-radius: 3px; }
        .clickable-chord:hover { background: #264f78; color: #fff; }

        /* COLUMN 3: Right Chords Drawer Utility Panel */
        #right-panel { 
            width: 260px; 
            flex-shrink: 0; 
            border-left: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            background: #252526; 
            overflow: hidden;
        }
        
        /* Text Resizer Control Row Container */
        #panel-slider-row { padding: 15px 15px 5px 15px; display: flex; flex-direction: column; gap: 8px; }
        .slider-container { display: flex; align-items: center; justify-content: space-between; background: #1e1e1e; padding: 8px 12px; border-radius: 6px; border: 1px solid #3c3c3c; }
        .slider-label { color: #aaa; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .slider-controls-wrap { display: flex; align-items: center; gap: 8px; }
        .slider-controls-wrap input[type="range"] { width: 90px; cursor: pointer; }

        #panel-controls { padding: 10px 15px 15px 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; gap: 5px; }
        .tab-btn { flex: 1; background: #3c3c3c; border: 1px solid #555; color: #aaa; padding: 6px 4px; border-radius: 4px; font-size: 11px; cursor: pointer; text-align: center; }
        .tab-btn.active { background: #007acc; color: white; border-color: #007acc; font-weight: bold; }
        
        #chord-display-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .empty-notice { color: #777; font-size: 13px; text-align: center; margin-top: 40px; font-style: italic; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="search-box">
            <input type="text" id="search" placeholder="Search song or artist..." oninput="filterSongs()">
        </div>
        <ul id="song-list"></ul>
    </div>

    <div id="center-stage">
        <div id="header-bar">
            <button id="toggle-panel-btn" class="active" onclick="toggleRightPanel()">🎸 Chords Pane</button>
        </div>
        <div id="content-area">
            <pre id="song-viewer">Select a song to begin playing...</pre>
        </div>
    </div>

    <div id="right-panel">
        <div id="panel-slider-row">
            <div class="slider-container">
                <span class="slider-label">Lyrics</span>
                <div class="slider-controls-wrap">
                    <span style="font-size: 11px; color: #888;">A</span>
                    <input type="range" id="font-slider" min="14" max="32" value="18" oninput="adjustTextScale(this.value)">
                    <span style="font-size: 15px; font-weight: bold; color: #fff;">A</span>
                </div>
            </div>
        </div>

        <div id="panel-controls">
            <button class="tab-btn active" id="tab-selected" onclick="setChordMode('selected')">Selected</button>
            <button class="tab-btn" id="tab-all" onclick="setChordMode('all')">All</button>
            <button class="tab-btn" id="tab-exotic" onclick="setChordMode('exotic')">Exotic</button>
        </div>
        
        <div id="chord-display-area">
            <div class="empty-notice">Click any chord name in the song text to view charts.</div>
        </div>
    </div>

    <script>
        let CHORD_DATABASE = {}; 
        const BASIC_CHORDS = ["C", "G", "D", "A", "E", "Am", "Em", "Dm"];

        let allSongs = [];
        let filteredSongs = [];
        let currentIndex = -1;
        let rightPanelOpen = true;
        let chordDisplayMode = 'selected'; 
        let currentlyClickedChord = null;

        // Directly alters CSS text sizing parameters instantly
        function adjustTextScale(pixelValue) {
            const songViewer = document.getElementById('song-viewer');
            if (songViewer) {
                songViewer.style.fontSize = pixelValue + 'px';
            }
        }

        function parseCustomDefinitionsFromText(text) {
            const lines = text.split('\n');
            lines.forEach(line => {
                const match = line.trim().match(/^([A-G][a-zA-Z0-9#+]*)\s+([0-9xX\-]{6})$/);
                if (match) {
                    const name = match[1];
                    const fretStr = match[2];
                    const frets = fretStr.split('').map(c => (c.toLowerCase() === 'x' || c === '-') ? 'x' : parseInt(c, 10));
                    
                    const numericFrets = frets.filter(f => f !== 'x');
                    const maxFret = Math.max(...numericFrets, 0);
                    const minFret = Math.min(...numericFrets.filter(f => f > 0), 1);
                    const baseFret = (maxFret > 4 && minFret > 1) ? minFret : 1;

                    const customShape = { frets: frets, baseFret: baseFret, markers: [] };
                    if (!CHORD_DATABASE[name]) {
                        CHORD_DATABASE[name] = [customShape];
                    } else {
                        const variationExists = CHORD_DATABASE[name].some(v => v.frets.join('') === fretStr);
                        if (!variationExists) CHORD_DATABASE[name].unshift(customShape);
                    }
                }
            });
        }

        function renderChordSVG(name, variationIdx = 0) {
            let chordVariations = CHORD_DATABASE[name];
            
            // Slash Chord Fallback Engine
            if ((!chordVariations || chordVariations.length === 0) && name.includes('/')) {
                const baseName = name.split('/')[0];
                chordVariations = CHORD_DATABASE[baseName];
            }
            
            if (!chordVariations || chordVariations.length === 0) return '';
            
            const idx = variationIdx % chordVariations.length;
            const chord = chordVariations[idx];
            const frets = chord.frets;
            const baseFret = chord.baseFret || 1;
            const formulaStr = `(${frets.join('')})`;
            const variationLabel = chordVariations.length > 1 ? ` Shape ${idx + 1}/${chordVariations.length}` : '';
            
            let svg = `<div class="chord-card-wrapper" style="display:flex; flex-direction:column; align-items:center; flex-shrink: 0;">
                <svg width="220" height="190" viewBox="0 0 220 190" xmlns="http://www.w3.org/2000/svg" style="background:#1e1e1e; border: 1px solid #3c3c3c; border-radius: 8px;">
                    <text x="35" y="35" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f5f5f5">${name}</text>
                    <text x="100" y="33" font-family="sans-serif" font-size="10" fill="#888">${formulaStr}${variationLabel}</text>
                    <g font-family="sans-serif" font-size="10" fill="#aaa" text-anchor="middle">
                        <text x="55" y="54">E</text><text x="75" y="54">A</text><text x="95" y="54">D</text>
                        <text x="115" y="54">G</text><text x="135" y="54">B</text><text x="155" y="54">e</text>
                    </g><g font-family="sans-serif" font-size="12" fill="#aaa" text-anchor="middle">`;

            frets.forEach((f, stringPos) => {
                const cx = 55 + (stringPos * 20);
                if (f === 'x' || f === 'X') svg += `<text x="${cx}" y="68">x</text>`;
                else if (f === 0) svg += `<text x="${cx}" y="68">o</text>`;
            });
            svg += `</g>`;

            if (baseFret === 1) {
                svg += `<line x1="55" y1="76" x2="155" y2="76" stroke="#fff" stroke-width="3"/>`;
            } else {
                svg += `<line x1="55" y1="76" x2="155" y2="76" stroke="#555" stroke-width="1"/>`;
                svg += `<text x="165" y="93" font-family="sans-serif" font-size="10" fill="#007acc" font-weight="bold">${baseFret} fr</text>`;
            }

            for (let i = 1; i <= 4; i++) {
                const cy = 76 + (i * 22);
                svg += `<line x1="55" y1="${cy}" x2="155" y2="${cy}" stroke="#555" stroke-width="1"/>`;
            }

            const widths = [2, 1.5, 1.2, 1, 0.8, 0.6];
            for (let i = 0; i < 6; i++) {
                const cx = 55 + (i * 20);
                svg += `<line x1="${cx}" y1="76" x2="${cx}" y2="164" stroke="#888" stroke-width="${widths[i]}"/>`;
            }

            if (chord.barre) {
                const b = chord.barre;
                const relativeFret = b.fret - baseFret + 1;
                const rx = 55 + (b.startStr * 20) - 6;
                const ry = 76 + (relativeFret * 22) - 16;
                const rw = ((b.endStr - b.startStr) * 20) + 12;
                svg += `<rect x="${rx}" y="${ry}" width="${rw}" height="11" rx="5.5" fill="#007acc"/>`;
                svg += `<text x="${rx + (rw/2)}" y="${ry + 9}" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">${b.fret}</text>`;
            }

            frets.forEach((f, strIdx) => {
                if (f !== 'x' && f > 0) {
                    if (chord.barre && f === chord.barre.fret && strIdx >= chord.barre.startStr && strIdx <= chord.barre.endStr) return; 
                    const relativeFret = f - baseFret + 1;
                    const cx = 55 + (strIdx * 20);
                    const cy = 76 + (relativeFret * 22) - 11;
                    
                    let label = f;
                    if (chord.markers && chord.markers.length > 0) {
                        const custom = chord.markers.find(m => m[0] === strIdx);
                        if (custom) label = custom[2]; 
                    }
                    svg += `<circle cx="${cx}" cy="${cy}" r="5.5" fill="#007acc"/>`;
                    svg += `<text x="${cx}" y="${cy + 3}" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">${label}</text>`;
                }
            });

            svg += `</svg></div>`;
            return svg;
        }

        function discoverSongChords() {
            const spans = document.querySelectorAll('.clickable-chord');
            let found = [];
            spans.forEach(span => {
                const chordName = span.textContent.trim();
                if (!found.includes(chordName)) found.push(chordName);
            });
            return found;
        }

        function updateChordPanel() {
            const display = document.getElementById('chord-display-area');
            display.innerHTML = '';

            if (!rightPanelOpen) {
                display.innerHTML = '<div class="empty-notice">Pane Hidden</div>';
                return;
            }

            const activeChords = discoverSongChords();

            if (chordDisplayMode === 'selected') {
                if (!currentlyClickedChord) {
                    display.innerHTML = '<div class="empty-notice">Click any chord name in the song text to view charts.</div>';
                } else if (!CHORD_DATABASE[currentlyClickedChord]) {
                    display.innerHTML = `<div class="empty-notice">No diagrams mapped for "${currentlyClickedChord}" yet.</div>`;
                } else {
                    const variations = CHORD_DATABASE[currentlyClickedChord];
                    variations.forEach((v, idx) => {
                        display.innerHTML += renderChordSVG(currentlyClickedChord, idx);
                    });
                }
            } else if (chordDisplayMode === 'all') {
                const targets = activeChords.filter(c => CHORD_DATABASE[c]);
                if (targets.length === 0) {
                    display.innerHTML = '<div class="empty-notice">No recognized chords found in song text.</div>';
                } else {
                    targets.forEach(c => { display.innerHTML += renderChordSVG(c, 0); });
                }
            } else if (chordDisplayMode === 'exotic') {
                const targets = activeChords.filter(c => CHORD_DATABASE[c] && !BASIC_CHORDS.includes(c));
                if (targets.length === 0) {
                    display.innerHTML = '<div class="empty-notice">No non-standard chords detected in this song.</div>';
                } else {
                    targets.forEach(c => { display.innerHTML += renderChordSVG(c, 0); });
                }
            }
        }

        function setChordMode(mode) {
            chordDisplayMode = mode;
            ['selected', 'all', 'exotic'].forEach(m => {
                document.getElementById(`tab-${m}`).classList.toggle('active', m === mode);
            });
            updateChordPanel();
        }

        // Re-engineered toggle mechanism completely safe against width compression anomalies
        function toggleRightPanel() {
            const panel = document.getElementById('right-panel');
            const btn = document.getElementById('toggle-panel-btn');
            
            if (panel.style.display === 'none') {
                panel.style.display = 'flex';
                rightPanelOpen = true;
                btn.classList.add('active');
            } else {
                panel.style.display = 'none';
                rightPanelOpen = false;
                btn.classList.remove('active');
            }
            updateChordPanel();
        }

        function selectChordFromText(chordName) {
            currentlyClickedChord = chordName;
            const panel = document.getElementById('right-panel');
            if (panel.style.display === 'none') {
                toggleRightPanel();
            }
            setChordMode('selected');
        }

        function structureLyricSheetMarkup(rawText) {
            parseCustomDefinitionsFromText(rawText);
            const lines = rawText.split('\n');
            
            const outputLines = lines.map(line => {
                const trimmed = line.trim();
                if (trimmed === '') return line;
                if (/^(Verse|Chorus|Bridge|Key|Tuning|Chords Used)/i.test(trimmed)) return line;

                const tokens = trimmed.split(/\s+/);
                const isChordLine = tokens.every(t => /^[A-G][a-zA-Z0-9#+\/]*$/.test(t));

                if (isChordLine) {
                    return line.replace(/([^\s]+)/g, (match) => {
                        return `<span class="clickable-chord" onclick="selectChordFromText('${match}')">${match}</span>`;
                    });
                }
                return line;
            });

            return outputLines.join('\n');
        }

        // Re-engineered resilient decoupled boot sequence
        async function initializeApplication() {
            // 1. Attempt to load the chord database independently
            try {
                const chordRes = await fetch('/api/chord-store');
                if (chordRes.ok) {
                    CHORD_DATABASE = await chordRes.json();
                    console.log(`🎯 Chord Database Connected: Loaded ${Object.keys(CHORD_DATABASE).length} shapes.`);
                } else {
                    console.warn("Chord store endpoint returned an error status.");
                }
            } catch (chordError) {
                console.error("Insulation Alert: Failed to connect to chord store, bypassing to songs:", chordError);
            }

            // 2. Load the song library independently
            try {
                const songRes = await fetch('/api/songs');
                if (songRes.ok) {
                    allSongs = await songRes.json();
                    filteredSongs = [...allSongs];
                    
                    renderSidebar();
                    
                    if (allSongs.length > 0) {
                        selectSong(0);
                    }
                } else {
                    document.getElementById('song-viewer').textContent = "Flask server returned an error pulling the song list.";
                }
            } catch (songError) {
                document.getElementById('song-viewer').textContent = "Network error: Unable to connect to your Flask song library.";
                console.error("Critical Song Fetch Fault:", songError);
            }
        }

        function renderSidebar() {
            const list = document.getElementById('song-list');
            list.innerHTML = '';
            filteredSongs.forEach((song, index) => {
                const li = document.createElement('li');
                li.id = `song-${index}`;
                if (index === currentIndex) li.className = 'active';
                li.innerHTML = `<div class="song-title">${song.title}</div><div class="song-artist">${song.artist}</div>`;
                li.onclick = () => selectSong(index);
                list.appendChild(li);
            });
        }

        async function selectSong(index) {
            if (index < 0 || index >= filteredSongs.length) return;
            
            if (currentIndex !== -1) {
                const prev = document.getElementById(`song-${currentIndex}`);
                if (prev) prev.classList.remove('active');
            }
            
            currentIndex = index;
            const activeLi = document.getElementById(`song-${currentIndex}`);
            if (activeLi) activeLi.classList.add('active');

            const song = filteredSongs[currentIndex];
            try {
                const res = await fetch(`/api/song/${encodeURIComponent(song.filename)}`);
                if (res.ok) {
                    const rawLyrics = await res.text();
                    document.getElementById('song-viewer').innerHTML = structureLyricSheetMarkup(rawLyrics);
                    currentlyClickedChord = null; 
                    updateChordPanel();
                }
            } catch (error) {
                console.error(error);
            }
        }

        function filterSongs() {
            const query = document.getElementById('search').value.toLowerCase();
            filteredSongs = allSongs.filter(s => s.title.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query));
            currentIndex = filteredSongs.length > 0 ? 0 : -1;
            renderSidebar();
            if (currentIndex !== -1) selectSong(currentIndex);
        }

        document.addEventListener('keydown', (e) => {
            if (document.activeElement.id === 'search') return;
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                if (currentIndex < filteredSongs.length - 1) selectSong(currentIndex + 1);
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                if (currentIndex > 0) selectSong(currentIndex - 1);
            }
        });

        window.onload = initializeApplication;
    </script>
</body>
</html>
